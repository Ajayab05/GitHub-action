name: Backend DevSecOps Pipeline

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: crud-backend
  ACCOUNT_ID: "076124125794"

defaults:
  run:
    shell: bash

jobs:

  bandit:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit
        run: |
          source /home/ec2-user/devsecops-tools/venv/bin/activate
          cd backend
          bandit -r . \
            -x ./venv,__pycache__,tests \
            -f txt

  pip-audit:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run pip-audit
        run: |
          source /home/ec2-user/devsecops-tools/venv/bin/activate
          cd backend
          pip-audit -r requirements.txt

  sonarqube:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: SonarQube Scan
        run: |
          docker run --rm \
            -e SONAR_HOST_URL=${{ secrets.SONAR_HOST_URL }} \
            -e SONAR_TOKEN=${{ secrets.SONAR_TOKEN }} \
            -v ${{ github.workspace }}:/usr/src \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.projectKey=crud-backend \
            -Dsonar.sources=/usr/src/backend

  checkov:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        run: |
          source /home/ec2-user/devsecops-tools/venv/bin/activate

          # Scan application code only
          checkov -d backend || true

  tests:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          cd backend
          pip3 install -r requirements.txt
          pip3 install pytest

      - name: Run Tests
        run: |
          cd backend
          pytest || true

  docker-build-scan-push:
    needs:
      - bandit
      - pip-audit
      - sonarqube
      - checkov
      - tests

    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password \
            --region $AWS_REGION | \
          docker login \
            --username AWS \
            --password-stdin \
            $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build \
            -t $ECR_REPOSITORY:${{ github.sha }} \
            ./backend

      - name: Generate SBOM
        run: |
          /home/ec2-user/bin/syft \
            $ECR_REPOSITORY:${{ github.sha }} \
            -o cyclonedx-json > sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Trivy Image Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            $ECR_REPOSITORY:${{ github.sha }}

      - name: Tag Docker Image
        run: |
          docker tag \
            $ECR_REPOSITORY:${{ github.sha }} \
            $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push \
            $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}
